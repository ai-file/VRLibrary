<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR全景平台</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:"Microsoft YaHei";
overflow:hidden;
}

/* 顶部控制栏 */

#topbar{
position:absolute;
top:15px;
left:15px;
z-index:1000;
display:flex;
gap:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

select,input{
background:#222;
color:#fff;
border:1px solid #444;
padding:6px 10px;
border-radius:4px;
}

/* 缩略图 */

#thumb-bar{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
padding:10px 20px;
background:rgba(0,0,0,0.4);
border-radius:10px;
max-width:90%;
overflow-x:auto;
}

.thumb{
flex:0 0 120px;
cursor:pointer;
text-align:center;
}

.thumb img{
width:120px;
height:70px;
object-fit:cover;
border-radius:6px;
}

.thumb span{
display:block;
color:#fff;
font-size:11px;
margin-top:5px;
}

/* 状态 */

#status{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
color:#00ffaa;
font-size:13px;
}

</style>

</head>

<body>

<div id="topbar">

<select id="folder"></select>

<input id="search" placeholder="搜索图片">

</div>

<div id="thumb-bar"></div>

<div id="status">扫描仓库中...</div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

/* GitHub配置 */

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN=`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/`;

const folderSelect=document.getElementById("folder");
const searchBox=document.getElementById("search");
const thumbBar=document.getElementById("thumb-bar");
const sky=document.getElementById("sky");
const status=document.getElementById("status");

let files=[];
let folders={};

init();

/* 扫描仓库 */

async function init(){

status.innerText="扫描GitHub仓库...";

try{

const url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(url);
const data=await res.json();

data.tree.forEach(f=>{

if(f.path.match(/\.(jpg|jpeg|png)$/i)){

files.push(f.path);

const folder=f.path.substring(0,f.path.lastIndexOf("/"));

if(!folders[folder]) folders[folder]=[];

folders[folder].push(f.path);

}

});

buildMenu();

status.innerText="扫描完成";

}catch(e){

status.innerText="GitHub扫描失败";

}

}

/* 构建菜单 */

function buildMenu(){

folderSelect.innerHTML="";

Object.keys(folders).forEach(f=>{

const op=document.createElement("option");

op.value=f;

op.text=f;

folderSelect.appendChild(op);

});

folderSelect.onchange=()=>{

showFolder(folderSelect.value);

};

}

/* 显示目录 */

function showFolder(folder){

thumbBar.innerHTML="";

folders[folder].forEach(p=>{

createThumb(p);

});

}

/* 搜索 */

searchBox.onkeyup=()=>{

const kw=searchBox.value.toLowerCase();

thumbBar.innerHTML="";

files.forEach(p=>{

if(p.toLowerCase().includes(kw)){

createThumb(p);

}

});

};

/* 创建缩略图 */

function createThumb(path){

const name=path.split("/").pop();

const url=CDN+path;

const div=document.createElement("div");

div.className="thumb";

div.innerHTML=`

<img src="${url}">
<span>${name}</span>

`;

div.onclick=()=>{

loadPanorama(url);

};

thumbBar.appendChild(div);

}

/* 加载全景 */

function loadPanorama(url){

status.innerText="加载全景...";

const img=new Image();

img.crossOrigin="anonymous";

img.onload=function(){

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

const MAX=8192;

if(img.width>MAX){

canvas.width=MAX;

canvas.height=Math.floor(img.height*(MAX/img.width));

}else{

canvas.width=img.width;

canvas.height=img.height;

}

ctx.drawImage(img,0,0,canvas.width,canvas.height);

sky.setAttribute("src",canvas.toDataURL("image/jpeg",0.9));

status.innerText="";

};

img.src=url;

}

</script>

</body>
</html>
