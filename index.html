<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR全景图库 V12</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
color:#fff;
}

/* 顶部 */

#topbar{
position:absolute;
top:0;
left:0;
right:0;
height:45px;
background:#333;
display:flex;
align-items:center;
padding:0 10px;
z-index:999;
}

#breadcrumb{
flex:1;
font-size:14px;
color:#ccc;
}

/* 左侧目录 */

#sidebar{
position:absolute;
top:45px;
bottom:100px;
left:0;
width:260px;
background:#111;
overflow:auto;
}

.folder{
padding:6px 10px;
cursor:pointer;
}

.folder:hover{
background:#222;
}

.children{
display:none;
padding-left:15px;
}

/* 缩略图 */

#thumbbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:100px;
background:rgba(0,0,0,.8);
display:flex;
overflow-x:auto;
gap:8px;
padding:10px;
}

.thumb img{
height:80px;
border-radius:6px;
cursor:pointer;
}

/* 加载 */

#loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="topbar">

<div id="breadcrumb">加载中...</div>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="sidebar"></div>

<div id="loader">扫描VR图库...</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file";
const REPO="VRLibrary";

let BRANCH="main";

const CDN=branch=>`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${branch}/`;

const sidebar=document.getElementById("sidebar");
const thumbbar=document.getElementById("thumbbar");
const breadcrumb=document.getElementById("breadcrumb");
const loader=document.getElementById("loader");
const sky=document.getElementById("sky");

let tree={};
let imageList=[];
let currentIndex=0;
let autoRotate=false;

init();

async function init(){

let data=localStorage.getItem("vr_tree");

if(data){

data=JSON.parse(data);

}else{

data=await scanGithub();

localStorage.setItem("vr_tree",JSON.stringify(data));

}

buildTree(data);

buildSidebar();

loader.style.display="none";

}

/* 自动识别分支 */

async function scanGithub(){

let url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/main?recursive=1`;

let res=await fetch(url);

if(res.status!==200){

BRANCH="master";

url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/master?recursive=1`;

res=await fetch(url);

}

return (await res.json()).tree;

}

/* 构建树 */

function buildTree(list){

list.forEach(item=>{

if(!item.path.match(/\.(jpg|jpeg|png)$/i)) return;

imageList.push(item.path);

let parts=item.path.split("/");

let node=tree;

parts.forEach((p,i)=>{

if(i===parts.length-1){

if(!node.images) node.images=[];

node.images.push(item.path);

}else{

if(!node[p]) node[p]={};

node=node[p];

}

});

});

}

/* 目录 */

function buildSidebar(){

renderNode(tree,sidebar,[]);

}

function renderNode(node,container,path){

Object.keys(node).forEach(k=>{

if(k==="images") return;

let div=document.createElement("div");

div.className="folder";

let count=countImages(node[k]);

div.innerText="▶ "+k+" ("+count+")";

container.appendChild(div);

let children=document.createElement("div");

children.className="children";

container.appendChild(children);

div.onclick=()=>{

children.style.display=
children.style.display==="block"?"none":"block";

showImages(node[k]);

breadcrumb.innerText=[...path,k].join(" / ");

};

renderNode(node[k],children,[...path,k]);

});

}

/* 图片统计 */

function countImages(node){

let c=0;

if(node.images) c+=node.images.length;

Object.keys(node).forEach(k=>{

if(typeof node[k]==="object")

c+=countImages(node[k]);

});

return c;

}

/* 显示缩略图 */

function showImages(node){

thumbbar.innerHTML="";

let imgs=[];

collectImages(node,imgs);

imgs.forEach((p,i)=>{

let url=CDN(BRANCH)+encodeURI(p);

let div=document.createElement("div");

div.className="thumb";

let img=document.createElement("img");

img.dataset.src=url;

img.onclick=()=>{

currentIndex=i;

loadPanorama(url);

};

div.appendChild(img);

thumbbar.appendChild(div);

});

lazyLoad();

if(imgs.length)

loadPanorama(CDN(BRANCH)+encodeURI(imgs[0]));

}

/* 收集图片 */

function collectImages(node,arr){

if(node.images)

arr.push(...node.images);

Object.keys(node).forEach(k=>{

if(typeof node[k]==="object")

collectImages(node[k],arr);

});

}

/* 懒加载 */

function lazyLoad(){

const imgs=document.querySelectorAll("#thumbbar img");

const observer=new IntersectionObserver(entries=>{

entries.forEach(e=>{

if(e.isIntersecting){

let img=e.target;

img.src=img.dataset.src;

observer.unobserve(img);

}

});

});

imgs.forEach(img=>observer.observe(img));

}

/* 全景 */

function loadPanorama(url){

sky.setAttribute("src",url);

preloadNext();

}

/* 预加载 */

function preloadNext(){

let next=imageList[currentIndex+1];

if(!next) return;

let img=new Image();

img.src=CDN(BRANCH)+next;

}

/* 自动旋转 */

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute(
"animation",
"property:rotation;to:0 360 0;loop:true;dur:30000"
);

}else{

sky.removeAttribute("animation");

}

}

/* VR */

function enterVR(){

document.querySelector("a-scene").enterVR();

}

/* 键盘浏览 */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight") next();

if(e.key==="ArrowLeft") prev();

});

function next(){

currentIndex++;

if(currentIndex>=imageList.length) return;

loadPanorama(CDN(BRANCH)+imageList[currentIndex]);

}

function prev(){

currentIndex--;

if(currentIndex<0) return;

loadPanorama(CDN(BRANCH)+imageList[currentIndex]);

}

</script>

</body>
</html>
