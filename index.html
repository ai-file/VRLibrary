<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>VR全景浏览</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* 顶部栏 */

#topbar{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.6);
padding:8px 15px;
border-radius:10px;
display:flex;
gap:10px;
z-index:999;
}

/* 目录按钮 */

#menuBtn{
cursor:pointer;
}

/* 折叠菜单 */

#menu{
position:absolute;
top:55px;
left:20px;
width:260px;
max-height:400px;
overflow:auto;
background:#111;
color:#fff;
border-radius:10px;
padding:10px;
display:none;
z-index:999;
}

.folder{
margin-top:6px;
cursor:pointer;
color:#00ffaa;
}

.file{
margin-left:15px;
cursor:pointer;
color:#ccc;
}

/* 缩略图 */

#thumbbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:95px;
background:rgba(0,0,0,.7);
display:flex;
gap:10px;
padding:5px;
overflow-x:auto;
}

.thumb img{
height:80px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.thumb img:hover{
transform:scale(1.1);
}

/* 加载窗口 */

#loader{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.85);
padding:25px;
border-radius:10px;
color:#00ffaa;
z-index:1000;
}

</style>

</head>

<body>

<div id="topbar">

<button id="menuBtn">📂目录</button>

<button onclick="randomPanorama()">随机</button>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="menu"></div>

<div id="loader">扫描仓库...</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file"
const REPO="VRLibrary"
const BRANCH="main"

const CDN=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`

const sky=document.getElementById("sky")
const menu=document.getElementById("menu")
const thumbbar=document.getElementById("thumbbar")
const loader=document.getElementById("loader")

let files=[]
let folders={}
let autoRotate=false

init()

async function init(){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`

const res=await fetch(api)

const data=await res.json()

data.tree.forEach(item=>{

if(item.path.match(/\.(jpg|jpeg|png)$/i)){

files.push(item.path)

const parts=item.path.split("/")

const folder=parts.length>1?parts[0]:"root"

if(!folders[folder]) folders[folder]=[]

folders[folder].push(item.path)

}

})

buildMenu()

loader.style.display="none"

if(files.length>0){

loadPanorama(CDN+encodeURI(files[0]))

}

}

function buildMenu(){

menu.innerHTML=""

for(let f in folders){

const folderDiv=document.createElement("div")

folderDiv.className="folder"

folderDiv.innerText="📂 "+f

menu.appendChild(folderDiv)

folders[f].forEach(file=>{

const fileDiv=document.createElement("div")

fileDiv.className="file"

fileDiv.innerText=file.split("/")[1]

fileDiv.onclick=()=>{

loadPanorama(CDN+encodeURI(file))

buildThumbs(folders[f])

}

menu.appendChild(fileDiv)

})

}

}

function buildThumbs(list){

thumbbar.innerHTML=""

list.forEach(p=>{

const url=CDN+encodeURI(p)

const div=document.createElement("div")

div.className="thumb"

const img=document.createElement("img")

img.src=url

img.onclick=()=>loadPanorama(url)

div.appendChild(img)

thumbbar.appendChild(div)

})

}

function loadPanorama(url){

sky.setAttribute("src",url)

}

function randomPanorama(){

const p=files[Math.floor(Math.random()*files.length)]

loadPanorama(CDN+encodeURI(p))

}

function toggleRotate(){

autoRotate=!autoRotate

if(autoRotate){

sky.setAttribute("animation","property:rotation;to:0 360 0;loop:true;dur:30000")

}else{

sky.removeAttribute("animation")

}

}

function enterVR(){

document.querySelector("a-scene").enterVR()

}

/* 菜单开关 */

document.getElementById("menuBtn").onclick=function(){

menu.style.display=menu.style.display=="block"?"none":"block"

}

</script>

</body>
</html>
