<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR 全景浏览系统</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body{
background:#000;
margin:0;
overflow:hidden;
font-family:"Microsoft YaHei",sans-serif;
}

/* 顶部导航 */
.top-nav{
position:absolute;
top:20px;
left:20px;
z-index:999;
display:flex;
gap:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
backdrop-filter:blur(10px);
}

.top-nav select{
background:#222;
color:#fff;
border:1px solid #444;
padding:6px 10px;
border-radius:4px;
min-width:150px;
}

/* 缩略图栏 */
#thumb-bar{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:999;
display:flex;
gap:15px;
padding:12px 20px;
background:rgba(0,0,0,0.4);
border-radius:12px;
max-width:90%;
overflow-x:auto;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

#thumb-bar::-webkit-scrollbar{
display:none;
}

.thumb-item{
flex:0 0 120px;
cursor:pointer;
text-align:center;
transition:0.3s;
}

.thumb-img{
width:120px;
height:70px;
object-fit:cover;
border-radius:6px;
border:2px solid transparent;
}

.thumb-item:hover .thumb-img{
border-color:#00ffaa;
transform:translateY(-3px);
}

.thumb-item.active .thumb-img{
border-color:#00d1b2;
box-shadow:0 0 12px #00d1b2;
}

.thumb-label{
color:#fff;
font-size:11px;
margin-top:6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* 状态提示 */
#status-text{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
color:#00ffaa;
font-size:13px;
font-weight:bold;
text-shadow:0 2px 4px rgba(0,0,0,0.8);
z-index:998;
}

</style>
</head>

<body>

<div class="top-nav">

<select id="lvl1">
<option value="">选择分类</option>
<option value="VR/时间地点事件">时间地点事件</option>
<option value="VR/时间流">时间流</option>
</select>

<select id="lvl2" disabled>
<option value="">选择目录</option>
</select>

</div>

<div id="thumb-bar"></div>

<div id="status-text">系统准备就绪</div>

<a-scene loading-screen="enabled:false">

<a-sky id="main-sky"
rotation="0 -90 0"
material="shader:flat;npot:true;">
</a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

/* GitHub 仓库配置 */

const CONFIG = {

owner:"ai-file",

repo:"VRLibrary"

};

const l1=document.getElementById("lvl1");
const l2=document.getElementById("lvl2");
const thumbBar=document.getElementById("thumb-bar");
const sky=document.getElementById("main-sky");
const statusText=document.getElementById("status-text");

/* 一级目录扫描 */

l1.onchange=async()=>{

if(!l1.value)return;

l2.disabled=true;

l2.innerHTML='<option>同步目录中...</option>';

try{

const res=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${l1.value}`);

const data=await res.json();

l2.innerHTML='<option value="">选择目录</option>';

data.forEach(item=>{

if(item.type==="dir"){

l2.options.add(new Option(item.name,item.path));

}

});

l2.disabled=false;

statusText.innerText="目录加载完成";

}catch(e){

statusText.innerText="GitHub 目录读取失败";

}

};

/* 二级目录扫描图片 */

l2.onchange=async()=>{

if(!l2.value)return;

thumbBar.innerHTML="";

statusText.innerText="扫描全景图片...";

try{

const res=await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${l2.value}`);

const data=await res.json();

data.forEach(file=>{

if(file.name.match(/\.(jpg|jpeg|png|JPG|PNG)$/)){

createThumbnail(file.name,file.download_url);

}

});

statusText.innerText="加载完成";

}catch(e){

statusText.innerText="读取失败";

}

};

/* 创建缩略图 */

function createThumbnail(name,url){

const item=document.createElement("div");

item.className="thumb-item";

item.innerHTML=`

<img class="thumb-img" src="${url}">

<span class="thumb-label">${name}</span>

`;

item.onclick=()=>{

document.querySelectorAll(".thumb-item")

.forEach(el=>el.classList.remove("active"));

item.classList.add("active");

loadPanorama(url);

};

thumbBar.appendChild(item);

}

/* 加载全景 */

function loadPanorama(url){

statusText.innerText="加载全景图...";

const img=new Image();

img.crossOrigin="anonymous";

img.onload=function(){

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

const MAX_WIDTH=8192;

/* 自动压缩超大图片 */

if(img.width>MAX_WIDTH){

canvas.width=MAX_WIDTH;

canvas.height=Math.floor(img.height*(MAX_WIDTH/img.width));

}else{

canvas.width=img.width;

canvas.height=img.height;

}

ctx.drawImage(img,0,0,canvas.width,canvas.height);

sky.setAttribute("src",

canvas.toDataURL("image/jpeg",0.85)

);

statusText.innerText="全景加载完成";

setTimeout(()=>{

statusText.innerText="";

},3000);

};

img.src=url;

}

</script>

</body>

</html>
