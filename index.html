<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>VR全景浏览</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

#topbar{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:999;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
}

button{
background:#222;
color:#fff;
border:1px solid #444;
padding:6px 12px;
border-radius:6px;
}

#thumbbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:95px;
background:rgba(0,0,0,.7);
display:flex;
gap:10px;
padding:5px;
overflow-x:auto;
}

.thumb img{
height:80px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.thumb img:hover{
transform:scale(1.1);
}

#loader{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.85);
padding:25px;
border-radius:10px;
color:#00ffaa;
z-index:1000;
text-align:center;
}

#progress{
width:260px;
height:6px;
background:#333;
margin-top:10px;
}

#bar{
width:0%;
height:6px;
background:#00ffaa;
}

</style>

</head>

<body>

<div id="topbar">

<button onclick="randomPanorama()">随机</button>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="loader">

<div id="loadtext">扫描图片...</div>

<div id="progress">

<div id="bar"></div>

</div>

</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";
const FOLDER="VR";

const CDN=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;

const thumbbar=document.getElementById("thumbbar");
const sky=document.getElementById("sky");

const loader=document.getElementById("loader");
const bar=document.getElementById("bar");
const loadtext=document.getElementById("loadtext");

let images=[];
let autoRotate=false;

init();

async function init(){

try{

loadtext.innerText="扫描VR目录...";

const url=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER}/`;

const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`);

const data=await res.json();

data.forEach(file=>{

if(file.name.match(/\.(jpg|jpeg|png)$/i)){

images.push(FOLDER+"/"+file.name);

}

});

buildThumbs();

if(images.length>0){

loadPanorama(CDN+encodeURI(images[0]));

}

}catch(e){

loadtext.innerText="读取仓库失败";

}

}

function buildThumbs(){

thumbbar.innerHTML="";

images.forEach(p=>{

const url=CDN+encodeURI(p);

const div=document.createElement("div");

div.className="thumb";

const img=document.createElement("img");

img.src=url;

img.onclick=()=>loadPanorama(url);

div.appendChild(img);

thumbbar.appendChild(div);

});

}

function loadPanorama(url){

loader.style.display="block";

bar.style.width="40%";

const img=new Image();

img.onload=function(){

bar.style.width="100%";

sky.setAttribute("src",url);

setTimeout(()=>{

loader.style.display="none";
bar.style.width="0%";

},400);

};

img.src=url;

}

function randomPanorama(){

const p=images[Math.floor(Math.random()*images.length)];

loadPanorama(CDN+encodeURI(p));

}

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute("animation","property:rotation;to:0 360 0;loop:true;dur:30000");

}else{

sky.removeAttribute("animation");

}

}

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>
</html>
