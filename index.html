<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR全景图库</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* 顶部 */

#topbar{
position:absolute;
top:20px;
left:20px;
display:flex;
gap:10px;
z-index:999;
}

select{

background:#222;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
font-size:14px;
}

/* 缩略图 */

#thumbbar{

position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);

background:rgba(0,0,0,.6);

padding:10px;
border-radius:12px;

display:flex;
gap:12px;
}

.thumb img{

height:70px;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
}

.thumb img:hover{

border:2px solid #00ffaa;

}

</style>
</head>

<body>

<div id="topbar">

<select id="level1"></select>

<select id="level2"></select>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN=`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/`;

const level1=document.getElementById("level1");
const level2=document.getElementById("level2");
const thumbbar=document.getElementById("thumbbar");
const sky=document.getElementById("sky");

let folders={};

let autoRotate=false;

init();

async function init(){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(api);

const data=await res.json();

data.tree.forEach(item=>{

if(!item.path.match(/\.(jpg|jpeg|png)$/i)) return;

let parts=item.path.split("/");

if(parts.length<3) return;

let f1=parts[0];
let f2=parts[1];

if(!folders[f1]) folders[f1]={};

if(!folders[f1][f2]) folders[f1][f2]=[];

folders[f1][f2].push(item.path);

});

buildLevel1();

}

function buildLevel1(){

level1.innerHTML="";

Object.keys(folders).forEach(f=>{

let op=document.createElement("option");

op.value=f;
op.text=f;

level1.appendChild(op);

});

buildLevel2();

}

function buildLevel2(){

let f1=level1.value;

level2.innerHTML="";

Object.keys(folders[f1]).forEach(f=>{

let op=document.createElement("option");

op.value=f;
op.text=f;

level2.appendChild(op);

});

showImages();

}

level1.onchange=buildLevel2;

level2.onchange=showImages;

function showImages(){

thumbbar.innerHTML="";

let f1=level1.value;
let f2=level2.value;

let list=folders[f1][f2];

list.forEach((p,i)=>{

let url=CDN+encodeURI(p);

let div=document.createElement("div");

div.className="thumb";

let img=document.createElement("img");

img.src=url;

img.onclick=()=>loadPanorama(url);

div.appendChild(img);

thumbbar.appendChild(div);

});

loadPanorama(CDN+encodeURI(list[0]));

}

function loadPanorama(url){

sky.setAttribute("src",url);

}

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute(
"animation",
"property:rotation;to:0 360 0;loop:true;dur:30000"
);

}else{

sky.removeAttribute("animation");

}

}

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>
</html>
