<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR全景图库 V11</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
color:#fff;
}

/* 顶部栏 */

#topbar{
position:absolute;
top:0;
left:0;
right:0;
height:50px;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
gap:10px;
padding:0 15px;
z-index:999;
}

/* 路径 */

#breadcrumb{
flex:1;
font-size:14px;
color:#aaa;
}

/* 目录 */

#sidebar{
position:absolute;
top:50px;
bottom:100px;
left:0;
width:280px;
background:#111;
overflow:auto;
z-index:998;
}

.folder{
padding:6px 10px;
cursor:pointer;
user-select:none;
}

.folder:hover{
background:#222;
}

.children{
display:none;
padding-left:15px;
}

/* 底部缩略图 */

#thumbbar{
position:absolute;
left:0;
right:0;
bottom:0;
height:100px;
background:rgba(0,0,0,.8);
display:flex;
overflow-x:auto;
gap:8px;
padding:8px;
}

.thumb img{
height:80px;
border-radius:6px;
cursor:pointer;
}

/* 加载 */

#loader{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:10px;
text-align:center;
z-index:1000;
}

#progress{
height:6px;
background:#333;
margin-top:10px;
border-radius:3px;
overflow:hidden;
}

#bar{
height:100%;
width:0%;
background:#00ffaa;
}

</style>
</head>

<body>

<div id="topbar">

<div id="breadcrumb">loading...</div>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="sidebar"></div>

<div id="loader">

扫描VR图库...

<div id="progress">
<div id="bar"></div>
</div>

</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

/* Github 配置 */

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN=`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/`;

/* DOM */

const sidebar=document.getElementById("sidebar");
const thumbbar=document.getElementById("thumbbar");
const breadcrumb=document.getElementById("breadcrumb");
const loader=document.getElementById("loader");
const bar=document.getElementById("bar");

const sky=document.getElementById("sky");

let tree={};
let currentFolder=[];
let autoRotate=false;

/* 初始化 */

init();

async function init(){

let cache=localStorage.getItem("vr_tree");

let data;

if(cache){

data=JSON.parse(cache);

}else{

const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(api);
data=await res.json();

localStorage.setItem("vr_tree",JSON.stringify(data));

}

buildTree(data.tree);

buildSidebar();

loader.style.display="none";

}

/* 构建目录树 */

function buildTree(list){

list.forEach((item,i)=>{

if(!item.path.match(/\.(jpg|jpeg|png)$/i)) return;

let parts=item.path.split("/");

let node=tree;

parts.forEach((p,idx)=>{

if(idx===parts.length-1){

if(!node.images) node.images=[];

node.images.push(item.path);

}else{

if(!node[p]) node[p]={};

node=node[p];

}

});

});

}

/* 构建侧边目录 */

function buildSidebar(){

sidebar.innerHTML="";

renderNode(tree,sidebar,[]);

}

/* 递归生成目录 */

function renderNode(node,container,path){

Object.keys(node).forEach(key=>{

if(key==="images") return;

let div=document.createElement("div");
div.className="folder";

let count=countImages(node[key]);

div.innerText="▶ "+key+" ("+count+")";

container.appendChild(div);

let children=document.createElement("div");
children.className="children";

container.appendChild(children);

div.onclick=()=>{

children.style.display=
children.style.display==="block"?"none":"block";

currentFolder=[...path,key];

breadcrumb.innerText=currentFolder.join(" / ");

showImages(node[key]);

};

renderNode(node[key],children,[...path,key]);

});

}

/* 统计图片 */

function countImages(node){

let count=0;

if(node.images) count+=node.images.length;

Object.keys(node).forEach(k=>{

if(typeof node[k]==="object")
count+=countImages(node[k]);

});

return count;

}

/* 显示缩略图 */

function showImages(node){

thumbbar.innerHTML="";

if(!node.images) return;

node.images.forEach(p=>{

let url=CDN+encodeURI(p);

let div=document.createElement("div");

div.className="thumb";

let img=document.createElement("img");

img.src=url;

img.onclick=()=>loadPanorama(url);

div.appendChild(img);

thumbbar.appendChild(div);

});

loadPanorama(CDN+encodeURI(node.images[0]));

}

/* 加载全景 */

function loadPanorama(url){

sky.setAttribute("src",url);

}

/* 自动旋转 */

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute(
"animation",
"property:rotation;to:0 360 0;loop:true;dur:30000"
);

}else{

sky.removeAttribute("animation");

}

}

/* VR */

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>
</html>
