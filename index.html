<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>VR全景浏览 V5.6</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* 顶部控制栏 */

#topbar{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:999;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
}

button,input,select{
background:#222;
color:#fff;
border:1px solid #444;
padding:6px 10px;
border-radius:6px;
}

/* 缩略图栏 */

#thumbbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:95px;
background:rgba(0,0,0,.7);
display:flex;
gap:10px;
padding:5px;
overflow-x:auto;
z-index:999;
}

/* 缩略图 */

.thumb img{
height:80px;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.thumb img:hover{
transform:scale(1.15);
}

/* 加载窗口 */

#loader{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.85);
padding:25px;
border-radius:10px;
color:#00ffaa;
z-index:1000;
text-align:center;

}

/* 进度条 */

#progress{
width:260px;
height:6px;
background:#333;
margin-top:10px;
}

#bar{
width:0%;
height:6px;
background:#00ffaa;
}

</style>

</head>

<body>

<div id="topbar">

<select id="folder"></select>

<input id="search" placeholder="搜索">

<button onclick="randomPanorama()">随机</button>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="loader">

<div id="loadtext">扫描图片...</div>

<div id="progress">

<div id="bar"></div>

</div>

</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

/* GitHub */

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

/* 使用RAW CDN（支持中文路径） */

const CDN=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;

/* DOM */

const sky=document.getElementById("sky");
const thumbbar=document.getElementById("thumbbar");
const search=document.getElementById("search");
const folderSelect=document.getElementById("folder");

const loader=document.getElementById("loader");
const loadtext=document.getElementById("loadtext");
const bar=document.getElementById("bar");

/* 数据 */

let files=[];
let folders={};
let currentList=[];
let autoRotate=false;

/* 初始化 */

init();

/* 扫描仓库 */

async function init(){

loadtext.innerText="扫描仓库...";
bar.style.width="20%";

try{

const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(api);
const data=await res.json();

data.tree.forEach(item=>{

if(item.path.match(/\.(jpg|jpeg|png)$/i)){

files.push(item.path);

const parts=item.path.split("/");

const folder=parts.length>1?parts[0]:"root";

if(!folders[folder]) folders[folder]=[];

folders[folder].push(item.path);

}

});

buildFolders();

currentList=files;

buildThumbs(currentList);

bar.style.width="80%";

if(files.length>0){

loadPanorama(CDN+encodeURI(files[0]));

}

}catch(e){

loadtext.innerText="GitHub读取失败";

}

}

/* 文件夹 */

function buildFolders(){

for(let f in folders){

const op=document.createElement("option");

op.value=f;
op.innerText=f;

folderSelect.appendChild(op);

}

}

/* 切换文件夹 */

folderSelect.onchange=function(){

const f=this.value;

currentList=folders[f];

buildThumbs(currentList);

loadPanorama(CDN+encodeURI(currentList[0]));

};

/* 搜索 */

search.onkeyup=function(){

const kw=this.value.toLowerCase();

const result=files.filter(p=>p.toLowerCase().includes(kw));

currentList=result;

buildThumbs(currentList);

};

/* 缩略图 */

function buildThumbs(list){

thumbbar.innerHTML="";

list.forEach(p=>{

const url=CDN+encodeURI(p);

const div=document.createElement("div");

div.className="thumb";

const img=document.createElement("img");

img.loading="lazy";

img.src=url;

img.onerror=function(){

this.src="https://via.placeholder.com/150x80?text=IMG";

};

img.onclick=()=>loadPanorama(url);

div.appendChild(img);

thumbbar.appendChild(div);

});

}

/* 加载全景 */

function loadPanorama(url){

loader.style.display="block";

loadtext.innerText="加载全景...";

bar.style.width="30%";

const img=new Image();

img.onload=function(){

bar.style.width="100%";

sky.setAttribute("src",url);

setTimeout(()=>{

loader.style.display="none";

bar.style.width="0%";

},400);

};

img.onerror=function(){

loadtext.innerText="图片加载失败";

setTimeout(()=>{

loader.style.display="none";

},1000);

};

img.src=url;

}

/* 随机 */

function randomPanorama(){

const p=currentList[Math.floor(Math.random()*currentList.length)];

loadPanorama(CDN+encodeURI(p));

}

/* 自动旋转 */

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute("animation","property:rotation;to:0 360 0;loop:true;dur:30000");

}else{

sky.removeAttribute("animation");

}

}

/* VR */

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>
</html>
