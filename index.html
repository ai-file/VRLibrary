<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR全景浏览</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

#topbar{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:8px;
display:flex;
gap:8px;
}

select,input,button{
background:#222;
color:#fff;
border:1px solid #555;
padding:6px 10px;
border-radius:4px;
}

#thumb-bar{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:rgba(0,0,0,.4);
padding:10px;
border-radius:8px;
max-width:95%;
overflow-x:auto;
}

.thumb img{
width:120px;
height:70px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
}

#status{
position:absolute;
top:70px;
left:10px;
color:#00ffaa;
z-index:999;
}

</style>
</head>

<body>

<div id="topbar">

<select id="folder"></select>

<input id="search" placeholder="搜索">

<button onclick="randomPanorama()">随机</button>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR模式</button>

</div>

<div id="status">初始化...</div>

<div id="thumb-bar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN=`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/`;

const sky=document.getElementById("sky");
const thumbBar=document.getElementById("thumb-bar");
const status=document.getElementById("status");

let files=[];
let autoRotate=false;

init();

async function init(){

status.innerText="扫描仓库...";

try{

const url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(url);
const data=await res.json();

data.tree.forEach(f=>{

if(f.path.match(/\.(jpg|jpeg|png)$/i)){

files.push(f.path);

}

});

status.innerText="发现图片 "+files.length+" 张";

if(files.length==0){

status.innerText="⚠ 仓库没有找到图片";

return;

}

buildThumbs();

loadPanorama(CDN+files[0]);

}catch(e){

status.innerText="GitHub扫描失败";

}

}

function buildThumbs(){

thumbBar.innerHTML="";

files.forEach(p=>{

const url=CDN+p;

const div=document.createElement("div");

div.className="thumb";

div.innerHTML=`<img src="${url}">`;

div.onclick=()=>loadPanorama(url);

thumbBar.appendChild(div);

});

}

function loadPanorama(url){

sky.setAttribute("src",url);

}

function randomPanorama(){

const p=files[Math.floor(Math.random()*files.length)];

loadPanorama(CDN+p);

}

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute("animation","property:rotation; to:0 360 0; loop:true; dur:30000");

}else{

sky.removeAttribute("animation");

}

}

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>
</html>
