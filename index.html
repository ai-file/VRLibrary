<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>VR全景图库</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* 顶部 */

#topbar{

position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:999;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;

}

/* 目录 */

#folderMenu{
position:relative;
}

#folderBtn{

background:#222;
color:#fff;
border:1px solid #444;
padding:6px 12px;
border-radius:6px;
cursor:pointer;

}

#folderList{

position:absolute;
top:35px;
left:0;
background:#111;
border:1px solid #333;
display:none;
max-height:300px;
overflow:auto;
min-width:200px;

}

.folderItem{

padding:6px 10px;
cursor:pointer;
color:#ddd;

}

.folderItem:hover{

background:#333;

}

button{

background:#222;
color:#fff;
border:1px solid #444;
padding:6px 12px;
border-radius:6px;

}

/* 底部缩略图 */

#thumbbar{

position:absolute;
bottom:0;
left:0;
right:0;
height:95px;
background:rgba(0,0,0,.7);
display:flex;
gap:10px;
padding:5px;
overflow-x:auto;

}

.thumb{

position:relative;

}

.thumb img{

height:80px;
border-radius:6px;
cursor:pointer;
transition:.2s;

}

/* 悬浮预览 */

.preview{

position:absolute;
bottom:90px;
left:0;
display:none;
z-index:1000;

}

.preview img{

width:280px;
border-radius:8px;
box-shadow:0 0 10px #000;

}

.thumb:hover .preview{

display:block;

}

/* 加载 */

#loader{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.85);
padding:25px;
border-radius:10px;
color:#00ffaa;
z-index:1000;
text-align:center;

}

</style>

</head>

<body>

<div id="topbar">

<div id="folderMenu">

<button id="folderBtn">目录 ▼</button>

<div id="folderList"></div>

</div>

<button onclick="toggleRotate()">自动旋转</button>

<button onclick="enterVR()">VR</button>

</div>

<div id="loader">

扫描VR目录...

</div>

<div id="thumbbar"></div>

<a-scene loading-screen="enabled:false">

<a-sky id="sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN=`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;

const thumbbar=document.getElementById("thumbbar");
const folderList=document.getElementById("folderList");

const sky=document.getElementById("sky");

let images=[];
let folders={};

let autoRotate=false;

init();

async function init(){

try{

const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(api);

const data=await res.json();

data.tree.forEach(item=>{

if(item.path.match(/\.(jpg|jpeg|png)$/i)){

images.push(item.path);

const dir=item.path.substring(0,item.path.lastIndexOf("/"));

if(!folders[dir]) folders[dir]=[];

folders[dir].push(item.path);

}

});

buildMenu();

showFolder(Object.keys(folders)[0]);

document.getElementById("loader").style.display="none";

}catch(e){

document.getElementById("loader").innerText="GitHub读取失败";

}

}

function buildMenu(){

folderList.innerHTML="";

for(let f in folders){

const div=document.createElement("div");

div.className="folderItem";

div.innerText=f;

div.onclick=()=>{

showFolder(f);

folderList.style.display="none";

};

folderList.appendChild(div);

}

}

document.getElementById("folderBtn").onclick=function(){

folderList.style.display=

folderList.style.display=="block"?"none":"block";

};

function showFolder(folder){

thumbbar.innerHTML="";

folders[folder].forEach(p=>{

const url=CDN+encodeURI(p);

const div=document.createElement("div");

div.className="thumb";

const img=document.createElement("img");

img.src=url;

img.onclick=()=>loadPanorama(url);

/* 悬浮预览 */

const preview=document.createElement("div");

preview.className="preview";

const pimg=document.createElement("img");

pimg.src=url;

preview.appendChild(pimg);

div.appendChild(preview);

div.appendChild(img);

thumbbar.appendChild(div);

});

loadPanorama(CDN+encodeURI(folders[folder][0]));

}

function loadPanorama(url){

const img=new Image();

img.onload=function(){

sky.setAttribute("src",url);

};

img.src=url;

}

function toggleRotate(){

autoRotate=!autoRotate;

if(autoRotate){

sky.setAttribute("animation","property:rotation;to:0 360 0;loop:true;dur:30000");

}else{

sky.removeAttribute("animation");

}

}

function enterVR(){

document.querySelector("a-scene").enterVR();

}

</script>

</body>

</html>
