<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR 全景自动浏览系统</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:"Microsoft YaHei";
}

.top-nav{
position:absolute;
top:20px;
left:20px;
z-index:999;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

.top-nav select{
background:#222;
color:#fff;
border:1px solid #444;
padding:6px 10px;
}

#thumb-bar{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
padding:12px 20px;
background:rgba(0,0,0,0.5);
border-radius:10px;
max-width:90%;
overflow-x:auto;
}

.thumb-item{
flex:0 0 120px;
cursor:pointer;
text-align:center;
}

.thumb-img{
width:120px;
height:70px;
object-fit:cover;
border-radius:6px;
}

.thumb-label{
color:#fff;
font-size:11px;
margin-top:5px;
}

#status-text{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
color:#00ffaa;
font-size:13px;
}

</style>
</head>

<body>

<div class="top-nav">

<select id="folderSelect">
<option>扫描仓库中...</option>
</select>

</div>

<div id="thumb-bar"></div>

<div id="status-text">系统启动中...</div>

<a-scene loading-screen="enabled:false">

<a-sky id="main-sky" rotation="0 -90 0"></a-sky>

<a-entity camera look-controls position="0 1.6 0"></a-entity>

</a-scene>

<script>

/* GitHub 仓库 */

const OWNER="ai-file";
const REPO="VRLibrary";
const BRANCH="main";

const CDN="https://cdn.jsdelivr.net/gh/"+OWNER+"/"+REPO+"@"+BRANCH+"/";

const folderSelect=document.getElementById("folderSelect");
const thumbBar=document.getElementById("thumb-bar");
const sky=document.getElementById("main-sky");
const statusText=document.getElementById("status-text");

let folderMap={};

init();

/* 初始化扫描仓库 */

async function init(){

statusText.innerText="扫描仓库目录...";

try{

const url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;

const res=await fetch(url);

const data=await res.json();

const files=data.tree;

files.forEach(file=>{

if(file.path.match(/\.(jpg|jpeg|png)$/i)){

const folder=file.path.substring(0,file.path.lastIndexOf("/"));

if(!folderMap[folder]){

folderMap[folder]=[];

}

folderMap[folder].push(file.path);

}

});

buildMenu();

statusText.innerText="扫描完成";

}catch(e){

statusText.innerText="GitHub扫描失败";

}

}

/* 生成目录菜单 */

function buildMenu(){

folderSelect.innerHTML="";

Object.keys(folderMap).forEach(folder=>{

const option=document.createElement("option");

option.value=folder;

option.text=folder;

folderSelect.appendChild(option);

});

folderSelect.onchange=()=>{

loadFolder(folderSelect.value);

};

}

/* 加载目录图片 */

function loadFolder(folder){

thumbBar.innerHTML="";

statusText.innerText="加载图片...";

folderMap[folder].forEach(path=>{

const url=CDN+path;

createThumb(path.split("/").pop(),url);

});

statusText.innerText="";

}

/* 创建缩略图 */

function createThumb(name,url){

const item=document.createElement("div");

item.className="thumb-item";

item.innerHTML=`

<img class="thumb-img" src="${url}">

<div class="thumb-label">${name}</div>

`;

item.onclick=()=>{

loadPanorama(url);

};

thumbBar.appendChild(item);

}

/* 加载全景 */

function loadPanorama(url){

statusText.innerText="加载全景...";

const img=new Image();

img.crossOrigin="anonymous";

img.onload=function(){

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

const MAX_WIDTH=8192;

if(img.width>MAX_WIDTH){

canvas.width=MAX_WIDTH;

canvas.height=Math.floor(img.height*(MAX_WIDTH/img.width));

}else{

canvas.width=img.width;

canvas.height=img.height;

}

ctx.drawImage(img,0,0,canvas.width,canvas.height);

sky.setAttribute("src",canvas.toDataURL("image/jpeg",0.85));

statusText.innerText="";

};

img.src=url;

}

</script>

</body>
</html>
